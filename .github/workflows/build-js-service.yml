name: Build JS Service

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      deployment_name:
        required: false
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ inputs.service_name }}/package-lock.json

      - name: Install dependencies
        working-directory: ./services/${{ inputs.service_name }}
        run: npm ci

      - name: Run ESLint
        continue-on-error: true
        working-directory: ./services/${{ inputs.service_name }}
        run: npm run lint

  test:
    needs: static-analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ inputs.service_name }}/package-lock.json

      - name: Install dependencies
        working-directory: ./services/${{ inputs.service_name }}
        run: npm ci

      - name: Run tests with coverage
        working-directory: ./services/${{ inputs.service_name }}
        run: |
          if grep -q '"test"' package.json; then
            # Check if jest-junit is installed
            if ! npm list jest-junit --depth=0 >/dev/null 2>&1; then
              echo "Installing jest-junit for test reporting..."
              npm install --no-save jest-junit
            fi
            
            # Run tests with coverage and junit reporting
            JEST_JUNIT_OUTPUT_DIR="./test-results" \
            JEST_JUNIT_OUTPUT_NAME="junit.xml" \
            npm test -- \
              --coverage \
              --coverageDirectory=coverage \
              --coverageReporters=text \
              --coverageReporters=lcov \
              --coverageReporters=html \
              --reporters=default \
              --reporters=jest-junit \
              --passWithNoTests
          else
            echo "No tests configured, skipping..."
          fi

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            services/${{ inputs.service_name }}/junit.xml
            services/${{ inputs.service_name }}/test-results/**/*.xml
          check_name: Test Results (${{ inputs.service_name }})

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service_name }}-test-results
          path: |
            services/${{ inputs.service_name }}/coverage/
            services/${{ inputs.service_name }}/test-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Code Coverage Report
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: services/${{ inputs.service_name }}/coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          delete-old-comments: true

  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ inputs.service_name }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ inputs.service_name }}
          file: ./services/${{ inputs.service_name }}/Dockerfile
          tags: |
            ${{ inputs.service_name }}:latest
            ${{ inputs.service_name }}:${{ github.sha }}
          outputs: type=docker,dest=/tmp/${{ inputs.service_name }}.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service_name }}-image
          path: /tmp/${{ inputs.service_name }}.tar
          retention-days: 1

  push:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.service_name }}-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/${{ inputs.service_name }}.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and Push ${{ inputs.service_name }}
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE=${{ inputs.service_name }}

          docker tag $IMAGE:latest $REGISTRY/$IMAGE:latest
          docker tag $IMAGE:${{ github.sha }} $REGISTRY/$IMAGE:${{ github.sha }}

          docker push $REGISTRY/$IMAGE:latest
          docker push $REGISTRY/$IMAGE:${{ github.sha }}

  deploy:
    needs: push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ inputs.deployment_name || inputs.service_name }}-task \
            --query 'taskDefinition' \
            --region ap-southeast-1 > task-def.json

      - name: Update task definition with new image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ inputs.deployment_name || inputs.service_name }}-container
          image: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.service_name }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          cluster: ecs-cluster
          service: ${{ inputs.service_name }}
          task-definition: ${{ steps.render.outputs.task-definition }}
          wait-for-service-stability: true